name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci --no-audit --no-fund --silent
      - name: Build application
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build-output.log
      - name: Verify Firestore privacy rules
        run: npx --yes firebase-tools@13.35.1 emulators:exec --only firestore --project demo-rushd "node scripts/firestore-rules-test.mjs"
      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build-output.log
          if-no-files-found: warn
